name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            cmake-args: -G Ninja
            package-file: "*-linux_x86_64.tar.xz"
          - name: macos
            os: macos-latest
            cmake-args: -G Ninja
            package-file: "*-macos.dmg"
          - name: windows
            os: windows-latest
            cmake-args: -A x64 -DEXCEPTION_HANDLING=ON -DVULKAN=ON
            package-file: "*-win64.zip"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare Linux
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libfreetype6-dev \
            libglew-dev libnotify-dev libpng-dev libsdl2-dev libsqlite3-dev \
            libswresample-dev libswscale-dev libx264-dev ninja-build pkg-config

      - name: Prepare macOS
        if: contains(matrix.os, 'macos')
        run: |
          brew update
          brew install ffmpeg molten-vk ninja pkg-config sdl2
          brew upgrade freetype
          pip3 install --break-system-packages dmgbuild
          echo /Library/Frameworks/Python.framework/Versions/3.12/bin >> $GITHUB_PATH
          sudo rm -rf /Library/Developer/CommandLineTools

      - name: Install Vulkan SDK (Windows)
        if: contains(matrix.os, 'windows')
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.296.0
          cache: true

      - name: Configure and build (Release)
        run: |
          mkdir release
          cd release
          cmake ${{ matrix.cmake-args }} -DCMAKE_BUILD_TYPE=Release -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
          cmake --build . --config Release --target everything

      - name: Package
        run: |
          cd release
          cmake --build . --config Release --target package_default
          mkdir artifacts
          mv ${{ matrix.package-file }} artifacts

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclient-${{ matrix.name }}
          path: release/artifacts
          if-no-files-found: error

      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/artifacts/*
          fail_on_unmatched_files: true
